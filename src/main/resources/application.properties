spring.application.name=carmaqcontrol

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/carmaqcontrol
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:carmaq-control-secret-key-2024-secure-key-gen}
jwt.expiration=86400000

# Configurações de Viagem (Cálculo Automático movido para o código)

# Configuração de upload de arquivos (fotos de máquinas)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads